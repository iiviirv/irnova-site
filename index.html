<!doctype html>
<html lang="fa" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05060a" />
    <meta
      name="description"
      content="Nova Proxy builds open-source networking and proxy tools — Nova-Proxy, Nova-Proxy-App, and NovaRadar — engineered to keep the internet open, fast, and reachable."
    />
    <meta property="og:title" content="Nova Proxy — Open-Source Networking Tools" />
    <meta
      property="og:description"
      content="Free, open-source proxy & networking tools to keep the internet open — with a simple step-by-step setup guide. ابزارهای متن‌باز برای عبور از فیلترینگ."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://novaproxy.online/" />
    <meta property="og:site_name" content="Nova Proxy" />
    <meta property="og:image" content="https://novaproxy.online/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nova Proxy — keep the internet open, fast, and reachable." />
    <meta property="og:locale" content="fa_IR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nova Proxy — Open-Source Networking Tools" />
    <meta
      name="twitter:description"
      content="Free, open-source proxy & networking tools to keep the internet open — with a simple step-by-step setup guide."
    />
    <meta name="twitter:image" content="https://novaproxy.online/og.png" />
    <title>Nova Proxy — Open-Source Networking Tools</title>
    <script>
      // Apply the saved language/direction/theme before paint to avoid a flash.
      (function () {
        try {
          var l = localStorage.getItem('irnova-lang') || 'fa'
          document.documentElement.lang = l
          document.documentElement.dir = l === 'fa' ? 'rtl' : 'ltr'
          var th = localStorage.getItem('nova-theme')
          document.documentElement.dataset.theme = th === 'light' ? 'light' : 'dark'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
