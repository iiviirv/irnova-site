<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05060a" />
    <meta
      name="description"
      content="Nova Proxy builds open-source networking and proxy tools — Nova-Proxy, Nova-Proxy-App, and NovaRadar — engineered to keep the internet open, fast, and reachable."
    />
    <meta property="og:title" content="Nova Proxy — Open-Source Networking Tools" />

      property="og:description"
      content="A suite of open-source proxy and networking tools designed to bypass filtering and keep connectivity flowing."
    />

    <title>Nova Proxy — Open-Source Networking Tools</title>
    <script>
      // Apply the saved language/direction before paint to avoid a flash.
      (function () {
        try {
          var l = localStorage.getItem('irnova-lang') || 'en'
          document.documentElement.lang = l
          document.documentElement.dir = l === 'fa' ? 'rtl' : 'ltr'
        } catch (e) {}
      })()
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
